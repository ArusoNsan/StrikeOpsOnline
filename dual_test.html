<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>STRIKE OPS オンライン検証ハーネス</title>
<style>
  html,body{margin:0;height:100%;background:#111;}
  .wrap{display:flex;height:100%;}
  .pane{flex:1;display:flex;flex-direction:column;min-width:0;}
  .pane h4{margin:0;padding:4px 8px;color:#eee;font:12px sans-serif;background:#222;}
  iframe{flex:1;border:2px solid #333;width:100%;}
</style>
</head>
<body>
<div class="wrap">
  <div class="pane"><h4>HOST (CT)</h4><iframe id="fh"></iframe></div>
  <div class="pane"><h4>GUEST (T)</h4><iframe id="fg"></iframe></div>
</div>
<script>
  // ?ws=wss://... で接続先を切替 (省略時はローカルリレー)
  const q=new URLSearchParams(location.search);
  const ws=encodeURIComponent(q.get("ws")||"ws://localhost:8732");
  const room=q.get("room")||"TEST"+Math.floor(Math.random()*1000); // 本番テスト時の部屋衝突防止
  const minp=q.get("minp")||"2";
  document.getElementById("fh").src=`strike_ops_online.html?ws=${ws}&room=${room}&name=HOST&team=CT&auto=1&minp=${minp}`;
  document.getElementById("fg").src=`strike_ops_online.html?ws=${ws}&room=${room}&name=GUEST&team=T&auto=1`;
</script>
</body>
</html>
